{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-7">

        <div class="card shadow-lg p-4">

            <h2 class="mb-4">

                Create Short URL

            </h2>

            <form method="POST">

                <label>Long URL</label>

                <input type="url"
                name="long_url"
                class="form-control mb-3"
                required>

                <label>Custom Code</label>

                <input type="text"
                name="custom_code"
                class="form-control mb-3">

                <label>Category</label>

                <input type="text"
                name="category"
                class="form-control mb-3">

                <label>Expiry Date</label>

                <input type="date"
                name="expiry_date"
                class="form-control mb-3">

                <button class="btn btn-primary w-100">

                    Create Short URL

                </button>

            </form>

            {% if short_url %}

            <div class="alert alert-success mt-4">

                <h5>Short URL Created</h5>

                <a href="{{ short_url }}" target="_blank">{{ short_url }}</a>

                {% if qr_file %}
                <div class="mt-3">
                    <strong>QR Code</strong>
                    <div class="mt-2">
                        <img src="{{ url_for('static', filename='qr/' + qr_file + '.png') }}" alt="QR" style="max-width:220px;border:1px solid #ddd;padding:6px" />
                    </div>
                </div>
                {% endif %}

                {% if external_short %}
                <div class="mt-3">
                    <strong>External Short</strong>
                    <div class="mt-2"><a href="{{ external_short }}" target="_blank">{{ external_short }}</a></div>
                </div>
                {% endif %}

            </div>

            {% endif %}

        </div>

    </div>

</div>

{% endblock %}
