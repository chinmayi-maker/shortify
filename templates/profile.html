{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow-lg p-4">

            <h2 class="mb-4">

                User Profile

            </h2>

            <h5>

                Username:
                {{ user.username }}

            </h5>

            <h5>

                Email:
                {{ user.email }}

            </h5>

            <h5>

                Joined:
                {{ user.created_at }}

            </h5>

        </div>

    </div>

</div>

{% endblock %}
