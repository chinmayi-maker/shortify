<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>URL Shortener</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f4f4f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      text-align: center;
      width: 400px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 20px;
      color: #333;
    }
    input[type="text"] {
      width: 80%;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 5px;
      margin-bottom: 15px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      background: #0078d7;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #005a9e;
    }
    .result {
      margin-top: 20px;
      font-size: 18px;
      color: #0078d7;
    }
    .result a {
      text-decoration: none;
      color: #0078d7;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>URL Shortener</h1>
    <input type="text" id="longUrl" placeholder="Enter your long URL here">
    <br>
    <button onclick="shortenUrl()">Shorten</button>
    <div class="result" id="result"></div>
  </div>

  <script>
    async function shortenUrl() {
      const longUrl = document.getElementById("longUrl").value;
      if (!longUrl) {
        alert("Please enter a URL");
        return;
      }

      const response = await fetch("http://localhost:5000/shorten", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url: longUrl })
      });

      const data = await response.json();
      document.getElementById("result").innerHTML =
        `Shortened URL: <a href="${data.short_url}" target="_blank">${data.short_url}</a>`;
    }
  </script>
</body>
</html>
